<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<title>오답 단어장 · 조문정</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --card: #ffffff;
    --accent: #2d5be3;
    --accent2: #e3502d;
    --wrong-col: #d94040;
    --blank-col: #d97a20;
    --text: #1a1a2e;
    --text2: #6b6b80;
    --muted: #b0aab8;
    --border: #e2dcd8;
    --tip-bg: #eef3ff;
    --tip-border: #b8ccff;
    --ex-bg: #faf8f5;
    --green: #1a9e6f;
    --pill-wrong: #fff0f0;
    --pill-blank: #fff5e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
    touch-action: pan-y;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  .header { flex-shrink: 0; padding: 12px 16px 8px; display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
  .header-left { min-width: 0; flex: 1; }
  .header-left .name { font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); }
  .header-left .title { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--text); margin-top: 2px; letter-spacing: -0.5px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .index-display { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .index-display span { color: var(--muted); font-weight: 400; }
  .prog-wrap { flex-shrink: 0; padding: 0 16px 10px; }
  .prog-dots { display: flex; justify-content: space-between; gap: 3px; }
  .pdot { flex: 1; height: 4px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
  .pdot.done { background: var(--accent); }
  .pdot.current { background: var(--accent); opacity: 0.4; }
  .card-viewport { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 0; touch-action: pan-y; user-select: none; -webkit-user-select: none; }
  .flash-card { position: absolute; width: calc(100% - 24px); max-width: 430px; height: calc(100% - 10px); max-height: 620px; will-change: transform, opacity; cursor: pointer; touch-action: pan-y; }
  .card-face { width: 100%; height: 100%; background: var(--card); border-radius: 22px; border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(45,91,227,0.08), 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .card-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; }
  .line-wrong { background: linear-gradient(90deg, var(--wrong-col) 0%, #ff9980 100%); }
  .line-blank { background: linear-gradient(90deg, var(--blank-col) 0%, #ffd080 100%); }
  .card-content { flex: 1; padding: 16px 18px 12px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .face-meaning, .face-word { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .scroll-area { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; touch-action: pan-y; overscroll-behavior: contain; scrollbar-width: thin; }
  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; flex-shrink: 0; }
  .badge { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
  .b-num { background: var(--border); color: var(--text2); }
  .b-wrong { background: var(--pill-wrong); color: var(--wrong-col); border: 1px solid #ffcccc; }
  .b-blank { background: var(--pill-blank); color: var(--blank-col); border: 1px solid #ffddb0; }
  .b-pos { background: #f0f0ff; color: var(--accent); border: 1px solid #d0d8ff; }
  .b-src1 { background: #f0fff8; color: #1a9e6f; border: 1px solid #b0e8cc; }
  .b-src2 { background: #f5f0ff; color: #6a3fb5; border: 1px solid #d0b8ff; }
  .meaning-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 8px; padding: 10px 0; min-height: 120px; }
  .meaning-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .meaning-text { font-size: 1.85rem; font-weight: 400; color: var(--text); line-height: 1.3; letter-spacing: -0.5px; }
  .word-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 6px; padding: 10px 0; min-height: 120px; }
  .word-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .word-text { font-family: 'Space Grotesk', sans-serif; font-size: 2.4rem; font-weight: 700; color: var(--text); letter-spacing: -1px; line-height: 1.1; word-break: break-word; }
  .word-pos { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }
  .student-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 8px 12px; background: var(--pill-wrong); border-radius: 10px; border: 1px solid #ffcccc; flex-shrink: 0; }
  .student-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--wrong-col); flex-shrink: 0; }
  .student-ans { font-size: 0.82rem; color: var(--wrong-col); text-decoration: line-through; text-decoration-color: rgba(217,64,64,0.5); }
  .blank-ans { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .tip-box { background: var(--tip-bg); border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; padding: 9px 13px; font-size: 0.74rem; color: #3a5ab0; line-height: 1.6; margin-top: 10px; flex-shrink: 0; }
  .tip-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
  .example-box { background: var(--ex-bg); border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; font-size: 0.72rem; color: var(--text2); line-height: 1.65; font-style: italic; margin-top: 7px; flex-shrink: 0; }
  .example-box em { color: var(--accent2); font-style: normal; font-weight: 600; }
  .tap-hint { text-align: center; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.5px; padding-top: 8px; padding-bottom: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .tap-hint::before, .tap-hint::after { content: ''; display: inline-block; width: 18px; height: 1px; background: var(--border); }
  .nav-hint { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 10px; }
  .nav-item { display: flex; align-items: center; gap: 5px; font-size: 0.63rem; color: var(--muted); letter-spacing: 0.5px; }
  .nav-arrow { font-size: 0.95rem; color: var(--border); }
  .nav-center { font-size: 0.63rem; color: var(--muted); }
  .flash-card { transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; }
  .flash-card.no-transition { transition: none !important; }
  .flash-card.dragging { transition: none !important; }
  .swipe-indicator { position: absolute; top: 50%; transform: translateY(-50%); font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; border-radius: 10px; opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.1s; }
  .ind-prev { left: 16px; color: var(--accent); background: rgba(45,91,227,0.08); border: 1.5px solid rgba(45,91,227,0.2); }
  .ind-next { right: 16px; color: var(--text2); background: rgba(0,0,0,0.05); border: 1.5px solid var(--border); }
  .mode-chip { display: inline-flex; align-items: center; gap: 2px; background: var(--border); border-radius: 22px; padding: 3px; }
  .mode-btn { font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.5px; padding: 8px 12px; border-radius: 18px; border: none; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.2s; min-height: 36px; min-width: 60px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .mode-btn:active { transform: scale(0.95); }
  .mode-btn.active { background: var(--card); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .end-card { position: absolute; width: calc(100% - 24px); max-width: 430px; height: calc(100% - 10px); max-height: 620px; will-change: transform, opacity; touch-action: pan-y; transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; }
  .end-card.no-transition { transition: none !important; }
  .end-card.dragging { transition: none !important; }
  .end-face { width: 100%; height: 100%; background: var(--card); border-radius: 22px; border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(45,91,227,0.08), 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .end-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; background: linear-gradient(90deg, var(--accent) 0%, #6a8eff 50%, var(--green) 100%); }
  .end-content { flex: 1; padding: 24px 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px; overflow: hidden; touch-action: pan-y; }
  .end-emoji { font-size: 3.4rem; line-height: 1; animation: pop 0.6s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes pop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  .end-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .end-title { font-size: 1.55rem; font-weight: 400; color: var(--text); line-height: 1.35; letter-spacing: -0.5px; margin-top: -6px; }
  .end-subtitle { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }
  .restart-btn { margin-top: 6px; background: var(--accent); color: #fff; border: none; border-radius: 16px; padding: 14px 32px; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 16px rgba(45,91,227,0.25); transition: transform 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent; touch-action: pan-y; min-height: 48px; display: inline-flex; align-items: center; gap: 8px; }
  .restart-btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(45,91,227,0.2); }
  .restart-btn .arrow { display: inline-block; transition: transform 0.2s; }
  .restart-btn:hover .arrow { transform: rotate(-180deg); }
  .end-hint { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.3px; margin-top: 2px; }
  .pdot.done.all { background: var(--green); }
  @media (max-height: 700px) { .end-emoji { font-size: 2.8rem; } .end-title { font-size: 1.35rem; } .end-content { gap: 14px; padding: 18px 20px; } }
  @media (max-height: 600px) { .end-emoji { font-size: 2.4rem; } .end-title { font-size: 1.2rem; } .end-subtitle { font-size: 0.78rem; } .end-content { gap: 10px; padding: 14px 18px; } }
  @media (max-height: 700px) { .meaning-text { font-size: 1.6rem; } .word-text { font-size: 2.1rem; } .meaning-center, .word-center { min-height: 100px; padding: 6px 0; } .badges { margin-bottom: 8px; } .tip-box, .example-box { font-size: 0.7rem; padding: 8px 11px; } }
  @media (max-height: 600px) { .header { padding: 8px 16px 6px; } .header-left .title { font-size: 1.05rem; } .meaning-text { font-size: 1.4rem; } .word-text { font-size: 1.85rem; } .nav-hint { padding: 6px 20px 8px; } }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="name">조문정 · 2026-05-02</div>
      <div class="title">오답 단어장</div>
    </div>
    <div class="header-right">
      <div class="index-display"><span id="cur">1</span> <span>/ <span id="tot">10</span></span></div>
      <div class="mode-chip">
        <button class="mode-btn active" id="btn-word" type="button">단어→뜻</button>
        <button class="mode-btn" id="btn-meaning" type="button">뜻→단어</button>
      </div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-dots" id="prog-dots"></div>
  </div>
  <div class="card-viewport" id="viewport">
    <div class="swipe-indicator ind-prev" id="ind-prev">← 이전</div>
    <div class="swipe-indicator ind-next" id="ind-next">다음 →</div>
  </div>
  <div class="nav-hint">
    <div class="nav-item"><span class="nav-arrow">→</span> 이전 단어</div>
    <div class="nav-center">탭 = 카드 뒤집기</div>
    <div class="nav-item">다음 단어 <span class="nav-arrow">←</span></div>
  </div>
</div>

<script>
// src: 'A' = Day 23/24 (시험1), 'B' = Day 13~22 (시험2)
const cards = [
  { num:23, word:'continent',   pos:'명사',        type:'wrong', src:'A',
    correct:'대륙',             student:'지속적인',
    tip:'continent = 대륙. continents: Africa, Asia, Europe, North America, South America, Australia, Antarctica. continuous/continual(지속적인)과 혼동 주의! continental = 대륙의(형용사).',
    example:'Asia is the largest <em>continent</em> on Earth by area. (아시아는 면적 기준으로 지구에서 가장 큰 대륙이다.)' },

  { num:31, word:'appliance',   pos:'명사',        type:'wrong', src:'A',
    correct:'가전제품, 기기',    student:'면허증',
    tip:'appliance = 가전제품/기기. apply(적용하다)에서 파생 → 생활에 적용되는 기기. license(면허증)와는 전혀 다른 단어! household appliance = 가전제품. kitchen appliance = 주방 기기.',
    example:'The store offers a wide range of kitchen <em>appliances</em> at discount prices. (그 매장은 다양한 주방 가전제품을 할인 가격에 판매한다.)' },

  { num:41, word:'flash',       pos:'명사/동사',   type:'wrong', src:'A',
    correct:'번쩍임, 섬광; 번쩍이다', student:'물줄기',
    tip:'flash = 번쩍임/섬광(명사), 번쩍이다(동사). flash of lightning = 번개의 섬광. in a flash = 순식간에. flashback = 회상 장면. 물줄기는 stream/flow/current.',
    example:'A <em>flash</em> of lightning lit up the dark sky for a brief moment. (번개 섬광이 잠깐 어두운 하늘을 밝혔다.)' },

  { num:44, word:'deposit',     pos:'명사/동사',   type:'wrong', src:'A',
    correct:'보증금, 예금; 퇴적물', student:'~에도 불구하고',
    tip:'deposit = 보증금/예금(명사), 맡기다/퇴적하다(동사). de(아래) + posit(놓다) → 아래에 놓다 = 예치하다/퇴적하다. despite(~에도 불구하고)와 혼동 주의! bank deposit = 은행 예금.',
    example:'You will need to pay a security <em>deposit</em> before moving into the apartment. (아파트에 입주하기 전에 보증금을 내야 한다.)' },

  { num:8,  word:'chronic',     pos:'형용사',      type:'wrong', src:'B',
    correct:'만성적인',          student:'로돈',
    tip:'chronic = 만성적인. chron(시간) → 오랜 시간에 걸친 = 만성적인. chronological(시간 순서의), chronicle(연대기)도 같은 어근. acute(급성의) ↔ chronic(만성의). chronic disease = 만성 질환.',
    example:'She has been dealing with <em>chronic</em> back pain for over five years. (그녀는 5년 넘게 만성 허리 통증을 앓고 있다.)' },

  { num:21, word:'prey',        pos:'명사/동사',   type:'wrong', src:'B',
    correct:'먹이, 먹잇감',      student:'희생하다',
    tip:'prey = 먹이/먹잇감(명사), 먹이로 삼다(동사). predator(포식자) ↔ prey(먹이). pray(기도하다)와 발음 같음 주의! bird of prey = 맹금류. prey on = ~을 먹이로 삼다.',
    example:'The eagle spotted its <em>prey</em> from high above and swooped down quickly. (독수리는 높은 곳에서 먹이를 발견하고 빠르게 내려왔다.)' },

  { num:30, word:'combat',      pos:'명사/동사',   type:'wrong', src:'B',
    correct:'전투, 싸우다',      student:'저지르다',
    tip:'combat = 전투(명사), 싸우다/맞서다(동사). com(함께) + bat(치다) → 함께 치다 = 전투. commit(저지르다)과 혼동 주의! combat climate change = 기후 변화에 맞서다. hand-to-hand combat = 백병전.',
    example:'The government introduced new measures to <em>combat</em> rising pollution levels. (정부는 증가하는 오염 수준에 맞서기 위해 새로운 조치를 도입했다.)' },

  { num:39, word:'sign',        pos:'명사/동사',   type:'wrong', src:'B',
    correct:'표시, 신호, 징표',   student:'선호',
    tip:'sign = 표시/신호/징표(명사), 서명하다(동사). signal(신호), signature(서명)도 같은 어근. prefer(선호하다)/preference(선호)와는 전혀 다른 단어! sign of danger = 위험 신호. sign a contract = 계약서에 서명하다.',
    example:'Dark clouds are a sure <em>sign</em> that a storm is approaching. (먹구름은 폭풍이 다가온다는 확실한 징표이다.)' },

  { num:45, word:'pioneer',     pos:'명사/동사',   type:'wrong', src:'B',
    correct:'개척자, 선구자',     student:'또래',
    tip:'pioneer = 개척자/선구자(명사), 개척하다(동사). pion(발) + eer → 앞장서 발을 내딛는 사람. peer(또래/동료)와 혼동 주의! pioneer in medicine = 의학 선구자. pioneer spirit = 개척 정신.',
    example:'Marie Curie was a true <em>pioneer</em> in the field of radioactive research. (마리 퀴리는 방사성 연구 분야의 진정한 선구자였다.)' },

  { num:47, word:'explicit',    pos:'형용사',      type:'wrong', src:'B',
    correct:'명백한, 명시적인',   student:'설명하다',
    tip:'explicit = 명백한/명시적인. ex(밖으로) + plicit(펼치다) → 밖으로 펼쳐 보이는 = 명백한. explain(설명하다)과 모양이 비슷하지만 품사가 다름 주의! implicit(암묵적인) ↔ explicit(명시적인). explicit instructions = 명확한 지시.',
    example:'The teacher gave <em>explicit</em> instructions about how to complete the assignment. (선생님은 과제를 완성하는 방법에 대해 명확한 지시를 내렸다.)' },
];

let idx = 0;
let startFace = 'word';
let showingBack = false;
let isAnimating = false;

function setStartFace(mode) {
  if (isAnimating) return;
  startFace = mode;
  showingBack = false;
  document.getElementById('btn-meaning').classList.toggle('active', mode === 'meaning');
  document.getElementById('btn-word').classList.toggle('active', mode === 'word');
  if (idx >= cards.length) return;
  renderCard(0);
}

document.getElementById('btn-meaning').addEventListener('click', () => setStartFace('meaning'));
document.getElementById('btn-word').addEventListener('click', () => setStartFace('word'));

function buildDots() {
  const wrap = document.getElementById('prog-dots');
  wrap.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot';
    d.id = `dot-${i}`;
    wrap.appendChild(d);
  });
  updateDots();
}

function updateDots() {
  const isEnd = idx >= cards.length;
  cards.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    if (isEnd) { d.className = 'pdot done all'; }
    else { d.className = 'pdot' + (i < idx ? ' done' : i === idx ? ' current' : ''); }
  });
  document.getElementById('cur').textContent = isEnd ? '✓' : (idx + 1);
  document.getElementById('tot').textContent = cards.length;
}

function buildCardHTML(card) {
  const srcClass = card.src === 'A' ? 'b-src1' : 'b-src2';
  const srcLabel = card.src === 'A' ? 'Day 23/24' : 'Day 13~22';
  const badgeType = `<span class="badge b-wrong">오답</span>`;
  const studentHTML = `<div class="student-row">
    <span class="student-label">내 답</span>
    <span class="student-ans">${card.student}</span>
  </div>`;
  const badgesHTML = `<div class="badges">
    <span class="badge b-num">No.${card.num}</span>
    ${badgeType}
    <span class="badge b-pos">${card.pos}</span>
    <span class="badge ${srcClass}">${srcLabel}</span>
  </div>`;

  const MEANING_FACE = `<div class="face-meaning">
    ${badgesHTML}
    <div class="meaning-center">
      <div class="meaning-label">뜻</div>
      <div class="meaning-text">${card.correct}</div>
    </div>
    <div class="tap-hint">탭해서 영단어 보기</div>
  </div>`;

  const MEANING_BACK = `<div class="face-meaning">
    ${badgesHTML}
    <div class="scroll-area">
      <div class="word-center" style="min-height:100px">
        <div class="word-label">영단어</div>
        <div class="word-text">${card.word}</div>
        <div class="word-pos">${card.pos}</div>
      </div>
      ${studentHTML}
      <div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div>
      <div class="example-box">${card.example}</div>
    </div>
    <div class="tap-hint">탭해서 뜻 보기</div>
  </div>`;

  const WORD_FACE = `<div class="face-word">
    ${badgesHTML}
    <div class="word-center">
      <div class="word-label">영단어</div>
      <div class="word-text">${card.word}</div>
      <div class="word-pos">${card.pos}</div>
    </div>
    <div class="tap-hint">탭해서 뜻 보기</div>
  </div>`;

  const WORD_BACK = `<div class="face-word">
    ${badgesHTML}
    <div class="scroll-area">
      <div class="word-center" style="min-height:80px">
        <div class="word-label">영단어</div>
        <div class="word-text" style="font-size:1.7rem">${card.word}</div>
      </div>
      <div class="meaning-label" style="text-align:center;margin-bottom:6px">뜻</div>
      <div class="meaning-text" style="text-align:center;font-size:1.4rem;margin-bottom:10px">${card.correct}</div>
      ${studentHTML}
      <div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div>
      <div class="example-box">${card.example}</div>
    </div>
    <div class="tap-hint">탭해서 영단어 보기</div>
  </div>`;

  const frontHTML = startFace === 'meaning' ? MEANING_FACE : WORD_FACE;
  const backHTML  = startFace === 'meaning' ? MEANING_BACK : WORD_BACK;
  return { frontHTML, backHTML };
}

function buildEndHTML() {
  return `<div class="end-face">
    <div class="end-line"></div>
    <div class="end-content">
      <div class="end-emoji">🎉</div>
      <div>
        <div class="end-label">All Done</div>
        <div class="end-title">학습을 모두 마쳤어요!</div>
      </div>
      <div class="end-subtitle">
        오답 단어 ${cards.length}개를 모두 복습했어요.<br>
        한 번 더 반복하면 더욱 확실해져요 ✨
      </div>
      <button class="restart-btn" id="restart-btn" type="button">
        <span class="arrow">↻</span>
        <span>다시 시작하기</span>
      </button>
      <div class="end-hint">→ 스와이프하면 마지막 카드로 돌아가요</div>
    </div>
  </div>`;
}

let cardEl = null;

function renderCard(direction) {
  const vp = document.getElementById('viewport');
  const old = vp.querySelector('.flash-card, .end-card');
  const isEnd = idx >= cards.length;
  const el = document.createElement('div');

  if (isEnd) {
    el.className = 'end-card no-transition';
    el.innerHTML = buildEndHTML();
  } else {
    const card = cards[idx];
    const { frontHTML, backHTML } = buildCardHTML(card);
    el.className = 'flash-card no-transition';
    el.dataset.front = 'true';
    el.innerHTML = `<div class="card-face">
      <div class="card-line line-wrong"></div>
      <div class="card-content">${showingBack ? backHTML : frontHTML}</div>
    </div>`;
  }

  if (direction !== 0) {
    el.style.transform = `translateX(${direction > 0 ? '100%' : '-100%'})`;
    isAnimating = true;
  }

  vp.appendChild(el);
  cardEl = el;

  if (isEnd) {
    const btn = el.querySelector('#restart-btn');
    if (btn) btn.addEventListener('click', restart);
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.classList.remove('no-transition');
      el.style.transform = 'translateX(0)';
    });
  });

  if (old) {
    old.classList.remove('no-transition');
    old.style.transform = `translateX(${direction > 0 ? '-100%' : '100%'})`;
    old.style.opacity = '0.3';
    setTimeout(() => { if (old.parentNode) old.remove(); isAnimating = false; }, 350);
  } else {
    isAnimating = false;
  }
  updateDots();
}

function restart() {
  if (isAnimating) return;
  idx = 0; showingBack = false;
  haptic(15);
  renderCard(-1);
}

function flipCard(el) {
  if (!el || isAnimating) return;
  if (idx >= cards.length) return;
  if (!el.querySelector('.card-face')) return;
  showingBack = !showingBack;
  const card = cards[idx];
  const { frontHTML, backHTML } = buildCardHTML(card);
  const content = el.querySelector('.card-content');
  const face = el.querySelector('.card-face');
  face.style.transition = 'transform 0.15s ease';
  face.style.transform = 'scale(0.97)';
  setTimeout(() => { content.innerHTML = showingBack ? backHTML : frontHTML; face.style.transform = 'scale(1)'; }, 80);
  setTimeout(() => { face.style.transition = ''; }, 230);
}

function haptic(ms = 8) { try { if (window.navigator && navigator.vibrate) navigator.vibrate(ms); } catch(_) {} }

function initInteraction() {
  const vp = document.getElementById('viewport');
  if (!vp) return;
  let startX = 0, startY = 0, startTime = 0, lastX = 0, tracking = false, hasMoved = false;
  let lockedDirection = null, pointerId = null;
  const DIR_LOCK_THRESHOLD = 8, TAP_THRESHOLD = 8, SWIPE_DIST = 60, SWIPE_VELOCITY_DIST = 30, SWIPE_TIME = 350;

  function getCard() { return vp.querySelector('.flash-card, .end-card'); }

  function startTracking(x, y) {
    if (isAnimating) return false;
    tracking = true; hasMoved = false; lockedDirection = null;
    startX = x; lastX = x; startY = y; startTime = Date.now();
    const card = getCard();
    if (card) card.classList.add('dragging');
    return true;
  }

  function moveTracking(x, y, ev) {
    if (!tracking) return;
    const dx = x - startX, dy = y - startY;
    lastX = x;
    if (lockedDirection === null) {
      if (Math.abs(dx) > DIR_LOCK_THRESHOLD || Math.abs(dy) > DIR_LOCK_THRESHOLD) {
        if (Math.abs(dx) > Math.abs(dy) * 1.1) { lockedDirection = 'h'; }
        else {
          lockedDirection = 'v'; tracking = false;
          const card = getCard();
          if (card) { card.classList.remove('dragging'); card.style.transform = ''; }
          return;
        }
      }
    }
    if (lockedDirection === 'h') {
      if (ev && ev.cancelable && ev.type === 'touchmove') ev.preventDefault();
      hasMoved = true;
      const card = getCard();
      if (card) {
        let factor = 0.55;
        if ((dx > 0 && idx === 0) || (dx < 0 && idx >= cards.length)) factor = 0.25;
        card.style.transform = `translateX(${dx * factor}px)`;
      }
      const t = Math.min(Math.abs(dx) / 70, 1);
      const ip = document.getElementById('ind-prev'), ix = document.getElementById('ind-next');
      if (dx > 5) { ip.style.opacity = String(t * 0.9); ix.style.opacity = '0'; }
      else if (dx < -5) { ix.style.opacity = String(t * 0.9); ip.style.opacity = '0'; }
      else { ip.style.opacity = '0'; ix.style.opacity = '0'; }
    }
  }

  function endTracking(endX, endY) {
    if (!tracking && lockedDirection !== 'h') { lockedDirection = null; return; }
    tracking = false;
    document.getElementById('ind-prev').style.opacity = '0';
    document.getElementById('ind-next').style.opacity = '0';
    const card = getCard();
    if (card) card.classList.remove('dragging');
    const dx = endX - startX, dy = endY - startY, dt = Date.now() - startTime;
    const wasHoriz = lockedDirection === 'h' && hasMoved;
    const isFastSwipe = wasHoriz && dt < SWIPE_TIME && Math.abs(dx) > SWIPE_VELOCITY_DIST;
    const isFarSwipe  = wasHoriz && Math.abs(dx) > SWIPE_DIST;

    if (wasHoriz && (isFastSwipe || isFarSwipe)) {
      if (card) card.style.transform = '';
      if (dx > 0 && idx > 0) { idx--; showingBack = false; haptic(10); renderCard(-1); }
      else if (dx < 0 && idx < cards.length) { idx++; showingBack = false; haptic(10); renderCard(1); }
      else if (card) {
        card.style.transition = 'transform 0.3s cubic-bezier(.175,.885,.32,1.275)';
        card.style.transform = 'translateX(0)';
        setTimeout(() => { if (card) card.style.transition = ''; }, 350);
      }
    } else {
      if (card && wasHoriz) {
        card.style.transition = 'transform 0.25s cubic-bezier(.4,0,.2,1)';
        card.style.transform = 'translateX(0)';
        setTimeout(() => { if (card) card.style.transition = ''; }, 280);
      } else if (card) { card.style.transform = ''; }
      if (lockedDirection === null && Math.abs(dx) < TAP_THRESHOLD && Math.abs(dy) < TAP_THRESHOLD) flipCard(card);
    }
    lockedDirection = null;
  }

  function cancelTracking() {
    tracking = false; hasMoved = false; lockedDirection = null;
    const card = getCard();
    if (card) { card.classList.remove('dragging'); card.style.transition = 'transform 0.25s'; card.style.transform = 'translateX(0)'; setTimeout(() => { if (card) card.style.transition = ''; }, 280); }
    document.getElementById('ind-prev').style.opacity = '0';
    document.getElementById('ind-next').style.opacity = '0';
  }

  const supportsPointer = window.PointerEvent !== undefined;
  if (supportsPointer) {
    vp.addEventListener('pointerdown', function(e) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      if (pointerId !== null) return;
      if (!startTracking(e.clientX, e.clientY)) return;
      pointerId = e.pointerId;
    });
    vp.addEventListener('pointermove', function(e) { if (e.pointerId !== pointerId) return; moveTracking(e.clientX, e.clientY, e); });
    vp.addEventListener('pointerup', function(e) { if (e.pointerId !== pointerId) return; pointerId = null; endTracking(e.clientX, e.clientY); });
    vp.addEventListener('pointercancel', function(e) { if (e.pointerId !== pointerId) return; pointerId = null; cancelTracking(); });
  } else {
    vp.addEventListener('touchstart', function(e) { if (e.touches.length !== 1) return; startTracking(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
    vp.addEventListener('touchmove', function(e) { if (!tracking || e.touches.length !== 1) return; moveTracking(e.touches[0].clientX, e.touches[0].clientY, e); }, { passive: false });
    vp.addEventListener('touchend', function(e) { if (!e.changedTouches || e.changedTouches.length === 0) return; endTracking(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }, { passive: true });
    vp.addEventListener('touchcancel', cancelTracking, { passive: true });
    let mouseDown = false;
    vp.addEventListener('mousedown', function(e) { if (!startTracking(e.clientX, e.clientY)) return; mouseDown = true; });
    window.addEventListener('mousemove', function(e) { if (!mouseDown) return; moveTracking(e.clientX, e.clientY, e); });
    window.addEventListener('mouseup', function(e) { if (!mouseDown) return; mouseDown = false; endTracking(e.clientX, e.clientY); });
  }
}

document.addEventListener('keydown', e => {
  if (isAnimating) return;
  if (e.key === 'ArrowRight' && idx > 0) { idx--; showingBack = false; renderCard(-1); }
  else if (e.key === 'ArrowLeft' && idx < cards.length) { idx++; showingBack = false; renderCard(1); }
  else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (idx >= cards.length) { restart(); }
    else if (cardEl) { flipCard(cardEl); }
  }
});

let lastTouchEnd = 0;
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

function fixVH() { document.documentElement.style.setProperty('--app-vh', `${window.innerHeight * 0.01}px`); }
window.addEventListener('resize', fixVH);
window.addEventListener('orientationchange', fixVH);
fixVH();

buildDots();
initInteraction();
renderCard(0);
</script>
</body>
</html>
